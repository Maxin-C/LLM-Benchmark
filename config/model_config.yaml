# 模型配置

# 模型列表
models:
  - name: DeepSeek-R1
    type: closed_source
    api_key: ${DEEPSEEK_API_KEY}
    endpoint: https://api.deepseek.com/v1/chat/completions
    model_name: deepseek-chat
    tier: S
  
  - name: Qwen-72B
    type: open_source
    path: /models/Qwen/Qwen-72B-Chat
    framework: pytorch
    tier: A
  
  - name: Llama-3-70B
    type: open_source
    path: /models/Llama-3-70B-Instruct
    framework: pytorch
    tier: A
  
  - name: Mistral-8x7B
    type: open_source
    path: /models/Mistral-8x7B-Instruct-v0.2
    framework: pytorch
    tier: A
  
  - name: Qwen-14B
    type: open_source
    path: /models/Qwen/Qwen-14B-Chat
    framework: pytorch
    tier: B
  
  - name: Llama-3-8B
    type: open_source
    path: /models/Llama-3-8B-Instruct
    framework: pytorch
    tier: B
  
  - name: Mistral-7B
    type: open_source
    path: /models/Mistral-7B-Instruct-v0.2
    framework: pytorch
    tier: B
  
  - name: Llama-2-7B
    type: open_source
    path: /models/Llama-2-7B-Chat
    framework: pytorch
    tier: control

# 模型参数配置
parameters:
  # 最大上下文长度
  max_context_length: 8192
  
  # 温度
  temperature: 0.7
  
  # top_p
  top_p: 0.9
  
  # 最大生成长度
  max_new_tokens: 512
  
  # 是否使用流式输出
  stream: false

# API配置
api:
  # 超时时间（秒）
  timeout: 60
  
  # 重试次数
  retries: 3
  
  # 请求间隔（秒）
  request_interval: 1
