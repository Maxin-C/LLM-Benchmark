# 仿真沙盒配置

# 虚拟患者配置（固定模型，使用DeepSeek官方API的deepseek-v4-pro，启用thinking模式）
virtual_patient:
  api_key: ${EASE_VP_API_KEY}
  base_url: ${EASE_VP_BASE_URL}
  model: deepseek-v4-pro
  is_reasoning: true
  reasoning_effort: high
  thinking_enabled: true
  temperature: 0.8
  presence_penalty: 0
  frequency_penalty: 0
  top_p: 0.9
  
  # 依从性级别
  compliance_levels:
    - high
    - medium
    - low
  
  # 情绪类型
  mood_types:
    - anxious
    - neutral
    - optimistic
    - worried
  
  # 认知偏误类型
  cognitive_biases:
    - confirmation_bias
    - availability_heuristic
    - anchoring

# 虚拟医生配置（待测试模型，通过环境变量配置）
virtual_doctor:
  api_key: ${EASE_DOCTOR_API_KEY}
  base_url: ${EASE_DOCTOR_BASE_URL}
  model: ${EASE_DOCTOR_MODEL}
  temperature: 0.8
  presence_penalty: 0
  frequency_penalty: 0
  top_p: 0.9

# 固定的评估器配置（使用DeepSeek官方API的deepseek-v4-pro）
judger:
  api_key: ${EASE_JUDGER_API_KEY}
  base_url: ${EASE_JUDGER_BASE_URL}
  model: deepseek-v4-pro
  temperature: 0.1
  presence_penalty: 0
  frequency_penalty: 0
  top_p: 1.0

# 对话监控器配置（使用DeepSeek官方API的deepseek-v4-pro）
dialogue_monitor:
  api_key: ${EASE_MONITOR_API_KEY}
  base_url: ${EASE_MONITOR_BASE_URL}
  model: deepseek-v4-pro
  max_tokens: 10
  temperature: 0.1
  presence_penalty: 0
  frequency_penalty: 0
  top_p: 1.0

scenario:
  # 场景类别
  categories:
    - targeted_therapy
    - endocrine_therapy
    - complication
    - psychological
    - followup
  
  # 最大对话轮数
  max_dialogue_rounds: 20

monitor:
  # 干扰注入概率
  intervention_probability: 0.3
  
  # 红线规则配置
  red_line_rules:
    - wrong_medication
    - contraindication
    - wrong_dosage
    - stage_mismatch

# 数据路径配置
data_paths:
  ehr_data: dataset/ehr_data/dataset.xlsx
  kg_data: dataset/kg_data/CMeKG.pkl
  persona_data: dataset/persona_data/
  guidelines: dataset/guidlines/formated_data_llm_optimized/
  expert_data: dataset/expert_data/